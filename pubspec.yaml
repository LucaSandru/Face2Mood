name: Face2Mood
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  tflite_flutter: ^0.12.1
  image: ^4.2.0
  google_mlkit_face_detection: ^0.13.0
  path_provider: ^2.1.4
  path: ^1.9.0
  sqflite: ^2.3.0
  intl: ^0.19.0
  fl_chart: ^0.66.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/test/happy/uncropped/
    - assets/test/angry/uncropped/
    - assets/test/disgust/uncropped/
    - assets/test/fear/uncropped/
    - assets/test/neutral/uncropped/
    - assets/test/sad/uncropped/
    - assets/test/surprise/uncropped/
